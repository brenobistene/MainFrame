<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Favicon MF negativo (MAINFRAME) — quadrado branco preenchido com
    "MF" vazado (negativo pelo bg). Antes "HQ" (Hub Quest); renomeado em
    2026-05-16 quando o app passou a se chamar MAINFRAME. Estilo
    Behance/CP2077 favicon: hi-contrast, legível em qualquer tab.
    Chamfer-cross sutil nos cantos pra assinatura cyber.
  -->
  <defs>
    <mask id="cut">
      <!-- Bloco branco = visível. MF preto = recorte. -->
      <rect width="32" height="32" fill="white"/>
      <text x="16" y="23.5" font-family="'JetBrains Mono', 'Consolas', monospace"
            font-size="18" font-weight="800" fill="black"
            text-anchor="middle" letter-spacing="-0.5">MF</text>
    </mask>
  </defs>
  <!-- Bloco branco com chamfer-cross + máscara que recorta o MF -->
  <path d="M0 4 L4 0 L28 0 L32 4 L32 28 L28 32 L4 32 L0 28 Z"
        fill="#ffffff" mask="url(#cut)"/>
</svg>
