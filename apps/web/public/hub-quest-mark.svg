<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Favicon HQ negativo — quadrado branco preenchido com "HQ" vazado
    (negativo pelo bg). Estilo Behance/CP2077 favicon: hi-contrast,
    legível em qualquer tab. Chamfer-cross sutil nos cantos pra
    assinatura cyber. Cor branca pura pra leitura imediata.
  -->
  <defs>
    <mask id="cut">
      <!-- Bloco branco = visível. HQ preto = recorte. -->
      <rect width="32" height="32" fill="white"/>
      <text x="16" y="23.5" font-family="'JetBrains Mono', 'Consolas', monospace"
            font-size="18" font-weight="800" fill="black"
            text-anchor="middle" letter-spacing="-0.5">HQ</text>
    </mask>
  </defs>
  <!-- Bloco branco com chamfer-cross + máscara que recorta o HQ -->
  <path d="M0 4 L4 0 L28 0 L32 4 L32 28 L28 32 L4 32 L0 28 Z"
        fill="#ffffff" mask="url(#cut)"/>
</svg>
